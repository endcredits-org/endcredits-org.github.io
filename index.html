* {

body {

  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#credits {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

#credits-content {
  position: absolute;
  left: 0;
  right: 0;
  text-align: center;
  padding: 0 20px;
  max-width: 900px;
  margin: 0 auto;
}

@keyframes scroll {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100%); }
}

#title-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.5s ease;
}

#title-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

#flag {
  width: min(210px, 42vw);
  aspect-ratio: 3 / 2;
  margin: 60px auto 0 auto;
  border-radius: 4px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 1s ease, visibility 1s ease;
}

#flag.visible {
  visibility: visible;
  opacity: 1;
}

html {
  font-size: clamp(14px, 2.5vw, 20px);
}

h2 {

  font-weight: bold;
  letter-spacing: 0.3em;
  text-transform: uppercase;

}

h3 {
  font-size: 1.1em;
  font-weight: bold;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin: 30px 0 16px 0;
}

h3 a {
  color: inherit;
  text-decoration: none;
}

.opening-title {
  text-align: center;
  margin: 100px auto 60px auto;
  max-width: 800px;
}

.opening-title .tagline {
  font-size: 0.75em;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.opening-title .film-title {
  font-size: 1.6em;
  font-weight: bold;
}

.credit {
  max-width: 800px;
  margin: 0 auto 10px auto;
  line-height: 1.3;
}

.role {
  font-size: 1em;
  font-weight: bold;
}

.name {
  font-size: 1em;
  font-weight: normal;
}

.layout-classic .credit {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.layout-classic .role {
  text-align: right;
}

.layout-classic .name {
  text-align: left;
}

.layout-justified .credit {
  display: flex;
  justify-content: space-between;
  gap: 20px;
}
.layout-justified .role {
  text-align: left;
}
.layout-justified .name {
  text-align: right;
}

.layout-single .credit {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
}

.layout-single .role {
  text-align: center;
}

.layout-single .name {
  text-align: center;
}

.layout-zigzag .credit {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 60%;
  margin: 0 auto 10px 0;
}
.layout-zigzag .credit:nth-child(even) {
  margin: 0 0 10px auto;
}
.layout-zigzag .role {
  text-align: right;
}
.layout-zigzag .name {
  text-align: left;
}

.layout-dot .credit {
  display: flex;
  align-items: baseline;
  max-width: 800px;
  margin: 0 auto 10px auto;
}
.layout-dot .role {
  font-weight: bold;
  white-space: nowrap;
  flex-shrink: 0;
}
.layout-dot .dot-leader {
  flex: 1;
  overflow: hidden;
  margin: 0 6px;
  align-self: baseline;
  min-width: 20px;
}

  white-space: nowrap;
  line-height: 1;
  vertical-align: baseline;
}
.layout-dot .name {
  font-weight: normal;
  white-space: nowrap;
  flex-shrink: 0;
}

.layout-wall {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px 20px;
  max-width: 900px;
  margin: 0 auto;
}
.layout-wall .credit {
  flex: 0 1 220px;
  text-align: center;
  margin: 0;
}
.layout-wall .role {
  font-weight: normal;
  font-size: 0.9em;
}

.section-left {
  margin-right: auto;
  max-width: 65%;
}
.section-right {
  margin-left: auto;
  max-width: 65%;
}

.annotations {
  text-align: center;
  margin: 60px auto 40px auto;
  max-width: 800px;
}

.annotation {
  font-size: 0.85em;
  line-height: 1.5;
  margin-bottom: 14px;
}

.annotation-attribution {

.music-section {

  max-width: 800px;

.music-section.two-column {

.music-entry {
  text-align: center;
}

.music-section:not(.two-column) .music-entry {

}

.music-section.two-column .music-entry:last-child:nth-child(odd) {

  max-width: 50%;
  margin: 0 auto;
}

.music-section .song-title {
  font-style: italic;
  font-size: 1em;
  margin-bottom: 2px;
}

.music-section .song-detail {
  font-size: 0.85em;
  line-height: 1.5;
}

.bold-name .credit .role {
  font-weight: normal;
}

.bold-name .credit .name {

}

.featured-card {

.featured-card .role {

  letter-spacing: 0.2em;

.bold-name .featured-card .role {

.bold-name .featured-card .name {
  font-weight: bold;
}

.credit a, .featured-card a, .annotation a {
  color: inherit;
  text-decoration: none;
}

[data-info] {
  position: relative;
  cursor: help;
}

[data-info]::after {
  content: attr(data-info);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 8px);
  transform: translateX(-50%);
  background: rgba(10,10,10,0.95);
  color: #eee;
  font-size: 0.78em;
  white-space: nowrap;
  padding: 5px 11px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 2px 12px rgba(0,0,0,0.7);
  pointer-events: none;
  z-index: 100;
  letter-spacing: 0.04em;
  font-weight: normal;
  line-height: 1.4;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0s 1.5s, visibility 0s 1.5s;
}

[data-info]::before {
  content: '';
  position: absolute;
  left: 50%;
  bottom: calc(100% + 4px);
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: rgba(10,10,10,0.95);
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0s 1.5s, visibility 0s 1.5s;
}

.cn:hover [data-info]::after,
.cn:hover [data-info]::before {
  opacity: 1;
  visibility: visible;
  transition: opacity 0s 0s, visibility 0s 0s;
}

.cn {
  display: inline-block;
  position: relative;
  vertical-align: baseline;
}

.wl {
  position: absolute;
  left: 100%;
  top: 0;
  opacity: 0;
  transition: opacity 0s 1.5s;
  font-size: 0.65em;
  color: #666;
  text-decoration: none;
  white-space: nowrap;
  padding-left: 3px;
}

.cn:hover .wl {
  opacity: 1;
  transition: opacity 0s 0s;
}

.wl-article { font-weight: bold; }
.wl-article .wl-o { color: #55CDFC; }
.wl-article .wl-m { color: #fff; }
.wl-article .wl-c { color: #F5A9B8; }

#credits-content:has(.cn:hover) {

}

.movie-title {

.movie-title a {

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function wikiLink(name) {
  function parseYear(s) {
    if (!s) return null;
    var m = s.match(/(\d{4})/);
    return m ? parseInt(m[1], 10) : null;
  }
  var info = birthDeath[name];
  var attrs = '';
  if (info && (info.born || info.died)) {
    var label = '';
    if (info.born && info.died) {
      var by = parseYear(info.born), dy = parseYear(info.died);
      var age = (by && dy) ? ' (' + (dy - by) + ')' : '';
      label = '\u2605 ' + info.born + ' \u25CB ' + info.died + age;
    } else if (info.died) {
      label = 'd. ' + info.died;
    } else if (info.born) {
      label = 'b. ' + info.born;
    }
    if (info.region) label += ' \u00b7 ' + info.region;
    attrs = ' data-info="' + escapeHtml(label) + '"';
  }
  var slug = (info && info.wiki) ? info.wiki : 'List_of_people_killed_for_being_transgender';
  var wlMarkup;
  if (info && info.wiki) {
    wlMarkup = '<a class="wl wl-article" href="https://en.wikipedia.org/wiki/' + slug + '" target="_blank" rel="noopener"><span class="wl-o">[</span><span class="wl-m">W</span><span class="wl-c">]</span></a>';
  } else {
    wlMarkup = '<a class="wl" href="https://en.wikipedia.org/wiki/' + slug + '" target="_blank" rel="noopener">[W]</a>';
  }
  return '<span class="cn"><span' + attrs + '>' + escapeHtml(name) + '</span>' + wlMarkup + '</span>';
}

    document.getElementById('title-overlay').classList.add('visible');
    var delay = 15000 + Math.floor(Math.random() * 45001);

    if (Math.random() < 0.08) {
      setTimeout(function () {
        var flagEl = document.getElementById('flag');
        var flags = [
          // trans
          'linear-gradient(to bottom, #55CDFC 0 20%, #F5A9B8 20% 40%, #fff 40% 60%, #F5A9B8 60% 80%, #55CDFC 80% 100%)',
          // rainbow
          'linear-gradient(to bottom, #E40303 0 16.67%, #FF8C00 16.67% 33.33%, #FFED00 33.33% 50%, #008026 50% 66.67%, #004CFF 66.67% 83.33%, #732982 83.33% 100%)',
          // bi
          'linear-gradient(to bottom, #D60270 0 40%, #9B59B6 40% 60%, #0038A8 60% 100%)',
          // lesbian
          'linear-gradient(to bottom, #D52D00 0 14.2857%, #EF7627 14.2857% 28.5714%, #FF9A56 28.5714% 42.8571%, #FFFFFF 42.8571% 57.1429%, #D162A4 57.1429% 71.4286%, #B55690 71.4286% 85.7143%, #A30262 85.7143% 100%)',
          // asexual
          'linear-gradient(to bottom, #000000 0 25%, #A4A4A4 25% 50%, #FFFFFF 50% 75%, #810081 75% 100%)',
          // pansexual
          'linear-gradient(to bottom, #FF218C 0 33.33%, #FFD800 33.33% 66.67%, #21B1FF 66.67% 100%)',
          // non-binary
          'linear-gradient(to bottom, #FFF430 0 25%, #FFFFFF 25% 50%, #9C59D1 50% 75%, #000000 75% 100%)',
          // genderqueer
          'linear-gradient(to bottom, #B57EDC 0 33.33%, #FFFFFF 33.33% 66.67%, #4A8123 66.67% 100%)',
          // genderfluid
          'linear-gradient(to bottom, #FF76A4 0 20%, #FFFFFF 20% 40%, #C011D7 40% 60%, #000000 60% 80%, #2F3CBE 80% 100%)',
          // agender
          'linear-gradient(to bottom, #000000 0 14.2857%, #A4A4A4 14.2857% 28.5714%, #FFFFFF 28.5714% 42.8571%, #B8F483 42.8571% 57.1429%, #FFFFFF 57.1429% 71.4286%, #A4A4A4 71.4286% 85.7143%, #000000 85.7143% 100%)'
        ];
        flagEl.style.background = flags[Math.floor(Math.random() * flags.length)];
        flagEl.classList.add('visible');
      }, Math.max(0, delay - 3000));
    }

    setTimeout(function () {
      location.reload();
    }, delay);
  });
});
</script>
</body>
