<title>End Credits</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: Georgia, "Times New Roman", serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#credits {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

#credits-content {
  position: absolute;
  left: 0;
  right: 0;
  text-align: center;
  padding: 0 20px;
  max-width: 900px;
  margin: 0 auto;
}

@keyframes scroll {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100%); }
}

#title-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.5s ease;
}

#title-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

#flag {
  width: min(210px, 42vw);
  aspect-ratio: 3 / 2;
  margin: 60px auto 0 auto;
  border-radius: 4px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 1s ease, visibility 1s ease;
}

#flag.visible {
  visibility: visible;
  opacity: 1;
}

html {
  font-size: clamp(14px, 2.5vw, 20px);
}

h2 {
  font-size: 1.4em;
  font-weight: bold;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin: 50px 0 24px 0;
}

h3 {
  font-size: 1.1em;
  font-weight: bold;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin: 30px 0 16px 0;
}

h3 a {
  color: inherit;
  text-decoration: none;
}

.opening-title {
  text-align: center;
  margin: 100px auto 60px auto;
  max-width: 800px;
}

.opening-title .tagline {
  font-size: 0.75em;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.opening-title .film-title {
  font-size: 1.6em;
  font-weight: bold;
}

.credit {
  max-width: 800px;
  margin: 0 auto 10px auto;
  line-height: 1.3;
}

.role {
  font-size: 1em;
  font-weight: bold;
}

.name {
  font-size: 1em;
  font-weight: normal;
}

.layout-classic .credit {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.layout-classic .role {
  text-align: right;
}

.layout-classic .name {
  text-align: left;
}

.layout-justified .credit {
  display: flex;
  justify-content: space-between;
  gap: 20px;
}

.layout-single .credit {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
}

.layout-single .role {
  text-align: center;
}

.layout-single .name {
  text-align: center;
}

.annotations {
  text-align: center;
  margin: 60px auto 40px auto;
  max-width: 800px;
}

.annotation {
  font-size: 0.85em;
  line-height: 1.5;
  margin-bottom: 14px;
}

.annotation-attribution {
  font-size: 0.85em;
}

.music-section {
  margin: 0 auto 40px auto;
  max-width: 800px;
}

.music-section.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

.music-entry {
  text-align: center;
}

.music-section:not(.two-column) .music-entry {
  margin-bottom: 28px;
}

.music-section.two-column .music-entry:last-child:nth-child(odd) {
  grid-column: 1 / -1;
  max-width: 50%;
  margin: 0 auto;
}

.music-section .song-title {
  font-style: italic;
  font-size: 1em;
  margin-bottom: 2px;
}

.music-section .song-detail {
  font-size: 0.85em;
  line-height: 1.5;
}

.bold-name .credit .role {
  font-weight: normal;
}

.bold-name .credit .name {
  font-weight: bold;
}

.featured-card {
  text-align: center;
  margin: 40px auto;
  max-width: 800px;
}

.featured-card .role {
  display: block;
  text-align: center;
  font-size: 1em;
  font-weight: bold;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.featured-card .name {
  display: block;
  text-align: center;
  font-size: 1em;
  font-weight: normal;
  margin-top: 4px;
}

.bold-name .featured-card .role {
  font-weight: normal;
}

.bold-name .featured-card .name {
  font-weight: bold;
}

.credit a, .featured-card a {
  color: inherit;
  text-decoration: none;
}



.movie-title {
  line-height: 1.3;
}

.movie-title a {
  color: inherit;
  text-decoration: none;
}
</style>

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function wikiLink(name) {
  return '<a href="https://en.wikipedia.org/wiki/List_of_people_killed_for_being_transgender" target="_blank" rel="noopener">' + escapeHtml(name) + '</a>';
